name: Run Site Check Script

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    env:
      XDG_CACHE_HOME: /home/runner/.cache
      NDA_GBB_SITE: ${{ secrets.NDA_GBB_SITE }}
      GOLF_SITE: ${{ secrets.GOLF_SITE }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Show cache before restore
        run: ls -la /home/runner/.cache || true

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: /home/runner/.cache/ms-playwright
          key: ${{ runner.os }}-playwright
          restore-keys: |
            ${{ runner.os }}-playwright

      - name: Show ms-playwright after restore
        run: ls -la /home/runner/.cache/ms-playwright || true

      - name: Install Playwright browsers
        run: python -m playwright install --with-deps

      - name: Show ms-playwright after install
        run: ls -la /home/runner/.cache/ms-playwright || true

      - name: Run script
        run: |
          echo "Running script..."
          python run.py
          echo "Script executed successfully"
