name: Run Site Check Script

on:
  schedule:
    - cron: "0 11 * * *"
  workflow_dispatch: 

jobs:
  run-script:
    runs-on: ubuntu-latest

    env:
      NDA_GBB_SITE: ${{ secrets.NDA_GBB_SITE }}   # inject your secret
      GOLF_SITE: ${{ secrets.GOLF_SITE }}


    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run script
        run: |
          echo "Running script..."
          python run.py
          echo "Script executed successfully"