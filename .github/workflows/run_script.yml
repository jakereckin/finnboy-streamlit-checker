name: Run Site Check Script

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    env:
      XDG_CACHE_HOME: /home/runner/.cache
      NDA_GBB_SITE: ${{ secrets.NDA_GBB_SITE }}
      GOLF_SITE: ${{ secrets.GOLF_SITE }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore Playwright cache
        uses: actions/cache@v4
        with:
          path: /home/runner/.cache/ms-playwright
          key: ${{ runner.os }}-playwright
          restore-keys: |
            ${{ runner.os }}-playwright

      - name: Check for Playwright browsers
        id: pw-check
        run: |
          # ensure the cache dir exists
          mkdir -p /home/runner/.cache/ms-playwright
          # compgen returns non-zero if no matches; use it to detect any files
          if compgen -G "/home/runner/.cache/ms-playwright/*" > /dev/null; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Install Playwright browsers (only if missing)
        if: steps.pw-check.outputs.exists == 'false'
        run: python -m playwright install --with-deps

      - name: Run script
        run: |
          echo "Running script..."
          python run.py
          echo "Script executed successfully"
